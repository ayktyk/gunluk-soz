<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>G&uuml;nl&uuml;k S&ouml;z</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cinzel:wght@500;600&family=Playfair+Display:ital,wght@0,700;1,600&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #110b07;
  --card-bg: #1e1108;
  --gold: #c9a84c;
  --gold-light: #f0d080;
  --gold-dim: rgba(201,168,76,0.18);
  --text: #f5ecd7;
  --text-dim: rgba(245,236,215,0.55);
  --border: rgba(201,168,76,0.25);
  --shadow: rgba(0,0,0,0.6);
}

body {
  min-height: 100dvh;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 24px 16px 32px;
  font-family: 'Crimson Pro', Georgia, serif;
  overflow-x: hidden;
  transition: background 0.8s ease;
}

body.t-ottoman { --bg:#110b07; --card-bg:#1e1108; --gold:#c9a84c; --gold-light:#f0d080; --text:#f5ecd7; }
body.t-modern  { --bg:#080e17; --card-bg:#0d1520; --gold:#4a9eff; --gold-light:#a0cfff; --text:#e6edf3; }
body.t-natural { --bg:#0c110a; --card-bg:#141a0f; --gold:#7ab648; --gold-light:#b8e07a; --text:#f0ead6; }

body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 60% 40% at 25% 15%, rgba(201,168,76,0.07) 0%, transparent 70%),
    radial-gradient(ellipse 50% 35% at 75% 85%, rgba(201,168,76,0.05) 0%, transparent 70%);
}

.app-header {
  position: relative; z-index: 2;
  text-align: center;
  margin-bottom: 22px;
  animation: fadeDown 0.6s ease both;
}
.app-logo {
  font-family: 'Cinzel', serif;
  font-size: 13px;
  letter-spacing: 4px;
  color: var(--gold);
  opacity: 0.7;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.app-date { font-size: 12px; color: var(--text-dim); letter-spacing: 1px; }
@keyframes fadeDown { from { opacity:0; transform:translateY(-12px);} to { opacity:1; transform:none;} }

.card {
  position: relative; z-index: 2;
  width: 100%; max-width: 430px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 24px;
  overflow: hidden;
  box-shadow: 0 12px 50px var(--shadow), inset 0 1px 0 rgba(255,255,255,0.04);
  transition: background 0.8s ease, border-color 0.8s ease;
  animation: fadeUp 0.7s ease both;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(28px);} to { opacity:1; transform:none;} }

.card-topbar {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 18px 20px 4px;
}
.top-ornament {
  width: 120px;
  height: 14px;
  position: relative;
  opacity: 0.72;
}
.top-ornament::before,
.top-ornament::after {
  content: '';
  position: absolute;
  top: 50%;
  width: 42px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.top-ornament::before { left: 0; }
.top-ornament::after { right: 0; }
.top-ornament span {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  color: var(--gold-light);
  font-size: 12px;
}

.quote-area {
  padding: 32px 28px 24px;
  position: relative;
  min-height: 200px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.deco-line {
  width: 40px; height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 0 auto 20px; opacity: 0.5;
}
.quote-text {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: clamp(17px, 4.8vw, 22px);
  line-height: 1.8; color: var(--text); text-align: center;
  position: relative; z-index: 1;
  transition: opacity 0.3s ease, transform 0.3s ease;
}
.t-ottoman .quote-text { font-family: 'Amiri', serif; font-size: clamp(18px, 5.2vw, 24px); }
.quote-text::before {
  content: '\201C';
  position: absolute; top: -22px; left: -8px;
  font-size: 72px; font-family: 'Playfair Display', serif;
  color: var(--gold); opacity: 0.12; line-height: 1; pointer-events: none;
}
.deco-line.bottom { margin: 20px auto 0; }

.source-area { padding: 0 28px 24px; text-align: center; }
.source-text {
  font-size: 13px; color: var(--text-dim); letter-spacing: 0.5px;
  transition: opacity 0.3s ease;
}

.card-divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
  margin: 0 20px;
}

.actions { padding: 20px 20px 22px; display: flex; flex-direction: column; gap: 10px; }

.share-btn {
  width: 100%;
  background: linear-gradient(135deg, #25d366 0%, #128c7e 100%);
  border: none; border-radius: 14px; padding: 15px 20px;
  color: #fff; font-family: 'Cinzel', serif; font-size: 14px; letter-spacing: 1.5px;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
  box-shadow: 0 4px 22px rgba(37,211,102,0.28);
  transition: transform 0.15s, box-shadow 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.share-btn:active { transform: scale(0.97); }
.share-btn:disabled { opacity: 0.5; pointer-events: none; }
.share-btn svg { width: 20px; height: 20px; fill: white; flex-shrink: 0; }

.bottom-row { display: flex; gap: 10px; }
.next-btn, .fav-btn {
  flex: 1; background: transparent;
  border: 1px solid var(--border); border-radius: 12px; padding: 11px 10px;
  color: var(--text-dim); font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 1px;
  cursor: pointer; transition: border-color 0.2s, color 0.2s, background 0.2s;
  -webkit-tap-highlight-color: transparent; white-space: nowrap;
}
.next-btn:active, .fav-btn:active {
  border-color: var(--gold); color: var(--gold-light); background: var(--gold-dim);
}

.loading-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 20px 0; }
.spinner {
  width: 36px; height: 36px;
  border: 2px solid var(--border); border-top-color: var(--gold);
  border-radius: 50%; animation: spin 0.9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  font-size: 13px; color: var(--text-dim); font-family: 'Cinzel', serif; letter-spacing: 1px;
  animation: pulse 1.5s ease infinite;
}
@keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

.fav-drawer {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--card-bg); border-top: 1px solid var(--border);
  border-radius: 24px 24px 0 0; padding: 20px 20px 36px;
  z-index: 100; transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
  max-height: 70vh; overflow-y: auto;
}
.fav-drawer.open { transform: translateY(0); }
.fav-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.fav-title { font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: 2px; color: var(--gold); }
.fav-close { background: none; border: none; color: var(--text-dim); font-size: 22px; cursor: pointer; }
.fav-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
.fav-item:last-child { border-bottom: none; }
.fav-item-text { font-size: 14px; color: var(--text); margin-bottom: 4px; font-style: italic; }
.fav-item-src { font-size: 12px; color: var(--text-dim); }
.fav-empty { text-align: center; color: var(--text-dim); font-size: 14px; padding: 24px 0; }

.fav-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  z-index: 99; opacity: 0; pointer-events: none; transition: opacity 0.35s ease;
}
.fav-overlay.open { opacity: 1; pointer-events: all; }

.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--gold); color: #1a0f0a;
  padding: 11px 22px; border-radius: 30px;
  font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 1px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  z-index: 200; opacity: 0; pointer-events: none;
  transition: opacity 0.3s, transform 0.3s; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.footer {
  position: relative; z-index: 2; margin-top: 18px;
  font-size: 11px; color: rgba(245,236,215,0.2); text-align: center;
}

.fade-out { opacity: 0 !important; transform: translateY(8px); }
</style>
</head>
<body class="t-ottoman">

<div class="app-header">
  <div class="app-logo">G&uuml;nl&uuml;k S&ouml;z</div>
  <div class="app-date" id="app-date"></div>
</div>

<div class="card" id="card">
  <div class="card-topbar">
    <div class="top-ornament"><span>&#10022;</span></div>
  </div>

  <div class="quote-area" id="quote-area">
    <div class="deco-line"></div>
    <div class="loading-wrap" id="loading">
      <div class="spinner"></div>
      <div class="loading-text">S&ouml;z haz&#305;rlan&#305;yor...</div>
    </div>
    <p class="quote-text" id="quote-text" style="display:none"></p>
    <div class="deco-line bottom" id="deco-bottom" style="display:none"></div>
  </div>

  <div class="source-area" id="source-area" style="display:none">
    <div class="source-text" id="source-text"></div>
  </div>

  <div class="card-divider"></div>

  <div class="actions">
    <button class="share-btn" id="shareBtn" onclick="shareWhatsApp()" disabled>
      <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.124.558 4.118 1.532 5.847L.057 23.012a.75.75 0 0 0 .93.93l5.166-1.475A11.946 11.946 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.853 0-3.587-.5-5.083-1.371l-.363-.217-3.767 1.075 1.075-3.767-.217-.363A9.945 9.945 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
      WhatsApp'ta G&ouml;rsel Payla&#351;
    </button>
    <div class="bottom-row">
      <button class="next-btn" onclick="loadNewQuote()">&#8635; &nbsp;Yeni S&ouml;z</button>
      <button class="fav-btn" onclick="saveFavorite()">♡ &nbsp;Kaydet</button>
      <button class="fav-btn" onclick="openFavDrawer()">☰ &nbsp;Kay&#305;tlar</button>
    </div>
  </div>
</div>

<div class="footer">Her g&uuml;n g&uuml;zel bir s&ouml;z</div>

<div class="fav-overlay" id="fav-overlay" onclick="closeFavDrawer()"></div>
<div class="fav-drawer" id="fav-drawer">
  <div class="fav-header">
    <div class="fav-title">KAYDED&#304;LENLER</div>
    <button class="fav-close" onclick="closeFavDrawer()">&times;</button>
  </div>
  <div id="fav-list"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const CATEGORIES = [
  { id:'dini',   label:'Dini · Manevi',        icon:'☪️',  theme:'t-ottoman',
    prompt:'Kur\'an ayetleri, hadis-i şerifler, Mevlânâ, Yunus Emre, Hacı Bektaş-ı Veli, Hz. Ali gibi kaynaklardan dini ve manevi bir söz.' },
  { id:'milli',  label:'Milli · Vatanseverlik', icon:'🇹🇷', theme:'t-modern',
    prompt:'Atatürk, Mehmed Akif Ersoy, Namık Kemal gibi isimlerden güçlü vatanseverlik temalı bir söz ya da Türk atasözü.' },
  { id:'hikmet', label:'Hikmet · Özlü Söz',     icon:'🍃',  theme:'t-natural',
    prompt:'Türk atasözleri, Nasreddin Hoca, Anadolu halk hikmeti veya divan edebiyatından derin bir özlü söz.' },
  { id:'aile',   label:'Aile · Sevgi',          icon:'❤️',  theme:'t-ottoman',
    prompt:'Anne, baba, aile, evlilik temalı İslami veya Türk kültürüne uygun sıcak bir söz.' },
];

let currentQuote = null;
let sessionUsed = [];
let localUsed = {};
let apiDisabled = false;
let apiNoticeShown = false;

try {
  localUsed = JSON.parse(localStorage.getItem('quote-local-used') || '{}');
  apiDisabled = sessionStorage.getItem('quote-api-disabled') === '1'
    || localStorage.getItem('quote-api-disabled') === '1';
} catch {}

const LOCAL_QUOTES = {
  dini: [
    { text: 'Sabır, imanın yarısıdır.', source: 'Hz. Ali (r.a.)' },
    { text: 'Ameller niyetlere göredir.', source: 'Hz. Muhammed (s.a.v.)' },
    { text: 'Ne olursan ol, yine gel.', source: 'Mevlânâ Celâleddîn-i Rûmî' },
    { text: 'İnsanlara merhamet etmeyene Allah da merhamet etmez.', source: 'Hz. Muhammed (s.a.v.)' },
    { text: 'Gönül yap ki gönlünde Hak doğsun.', source: 'Hacı Bektaş-ı Veli' },
    { text: 'Az söz, çok mânâ taşır.', source: 'Yunus Emre' },
    { text: 'İlim ilim bilmektir, ilim kendin bilmektir.', source: 'Yunus Emre' },
    { text: 'Hiç bilenlerle bilmeyenler bir olur mu?', source: 'Kur’an-ı Kerim, Zümer 9' },
    { text: 'Kolaylaştırınız, zorlaştırmayınız.', source: 'Hz. Muhammed (s.a.v.)' },
    { text: 'Doğru söz yemin istemez.', source: 'Türk Atasözü' },
    { text: 'Bir gönül yıktın ise bu kıldığın namaz değil.', source: 'Yunus Emre' },
    { text: 'Kanaat tükenmez bir hazinedir.', source: 'Hz. Muhammed (s.a.v.)' }
  ],
  milli: [
    { text: 'Vatanını en çok seven, görevini en iyi yapandır.', source: 'Mustafa Kemal Atatürk' },
    { text: 'Allah bu millete bir daha İstiklal Marşı yazdırmasın.', source: 'Mehmet Akif Ersoy' },
    { text: 'Bayrakları bayrak yapan üstündeki kandır.', source: 'Arif Nihat Asya' },
    { text: 'Yiğit düştüğü yerden kalkar.', source: 'Türk Atasözü' },
    { text: 'Birlikten kuvvet doğar.', source: 'Türk Atasözü' },
    { text: 'Egemenlik kayıtsız şartsız milletindir.', source: 'Mustafa Kemal Atatürk' },
    { text: 'Ya istiklal ya ölüm.', source: 'Mustafa Kemal Atatürk' },
    { text: 'Sahipsiz vatanın batması haktır; sen sahip çıkarsan bu vatan batmayacaktır.', source: 'Mehmet Akif Ersoy' },
    { text: 'Vatan sevgisi imandandır.', source: 'Toplumsal söz' },
    { text: 'Bir elin nesi var, iki elin sesi var.', source: 'Türk Atasözü' },
    { text: 'İstiklal, uğrunda can verilen mukaddes bir emanettir.', source: 'Anonim' },
    { text: 'Milletin bağımsızlığını yine milletin azim ve kararı kurtaracaktır.', source: 'Mustafa Kemal Atatürk' }
  ],
  hikmet: [
    { text: 'Az olsun, öz olsun.', source: 'Türk Atasözü' },
    { text: 'Sakla samanı, gelir zamanı.', source: 'Türk Atasözü' },
    { text: 'Acele işe şeytan karışır.', source: 'Türk Atasözü' },
    { text: 'Damlayan su taşı deler.', source: 'Türk Atasözü' },
    { text: 'Bilenle bilmeyen bir olmaz.', source: 'Anonim hikmet sözü' },
    { text: 'Çok söz yükü, az söz hikmeti götürür.', source: 'Anadolu irfanı' },
    { text: 'Görünen köy kılavuz istemez.', source: 'Türk Atasözü' },
    { text: 'Taşıma su ile değirmen dönmez.', source: 'Türk Atasözü' },
    { text: 'Söz gümüşse sükût altındır.', source: 'Türk Atasözü' },
    { text: 'Akıl akıldan üstündür.', source: 'Türk Atasözü' },
    { text: 'İşleyen demir ışıldar.', source: 'Türk Atasözü' },
    { text: 'Vakit nakittir.', source: 'Anonim' }
  ],
  aile: [
    { text: 'Cennet annelerin ayakları altındadır.', source: 'Hz. Muhammed (s.a.v.)' },
    { text: 'Yuvayı dişi kuş yapar.', source: 'Türk Atasözü' },
    { text: 'Aile, huzurun ilk mektebidir.', source: 'Anonim' },
    { text: 'Baba, evladın sırtını dayadığı dağdır.', source: 'Anonim' },
    { text: 'Sevgi paylaştıkça çoğalır.', source: 'Anonim' },
    { text: 'Bir evde saygı varsa, o evde bereket vardır.', source: 'Anadolu sözü' },
    { text: 'Ana gibi yar, Bağdat gibi diyar olmaz.', source: 'Türk Atasözü' },
    { text: 'Aile küçük bir toplumdur.', source: 'Anonim' },
    { text: 'Ev alma, komşu al.', source: 'Türk Atasözü' },
    { text: 'Sevgi emektir.', source: 'Anonim' },
    { text: 'Yuvada huzur varsa gönülde de huzur vardır.', source: 'Anonim' },
    { text: 'Anne kalbi çocuğun ilk evidir.', source: 'Anonim' }
  ]
};

CATEGORIES.splice(0, CATEGORIES.length, 
  {
    id: 'dini',
    label: 'Dini · Manevi',
    icon: '☪️',
    theme: 't-ottoman',
    prompt: 'Kur\'an-ı Kerim, hadis-i şerifler, Hz. Ali, Gazali, İmam Rabbani gibi kaynaklardan yaşlı insanların gönlüne dokunacak dini ve manevi bir söz.'
  },
  {
    id: 'dua',
    label: 'Dua · Teselli',
    icon: '🤲',
    theme: 't-ottoman',
    prompt: 'Sabır, şükür, tevekkül, ahiret ümidi, kalp huzuru ve teselli temalı; insanı yumuşatan, içini ferahlatan bir söz veya dua cümlesi.'
  },
  {
    id: 'hikmet',
    label: 'Hikmet · İrfan',
    icon: '🍃',
    theme: 't-natural',
    prompt: 'Anadolu irfanı, gönül terbiyesi, hayat tecrübesi ve tasavvufi hikmet taşıyan sade ama derin bir söz.'
  },
  {
    id: 'deyis',
    label: 'Gönül · Deyişler',
    icon: '🌙',
    theme: 't-ottoman',
    prompt: 'Yunus Emre, Mevlânâ, Hacı Bektaş-ı Veli gibi isimlerden maneviyatı güçlendiren, dokunaklı ve içli bir deyiş.'
  }
);

Object.assign(LOCAL_QUOTES, {
  dini: [
    { text: 'Sabır, imanın yarısıdır.', source: 'Hz. Ali (r.a.)' },
    { text: 'Ameller niyetlere göredir.', source: 'Hz. Muhammed (s.a.v.)' },
    { text: 'Kolaylaştırınız, zorlaştırmayınız.', source: 'Hz. Muhammed (s.a.v.)' },
    { text: 'Kanaat tükenmez bir hazinedir.', source: 'Hz. Muhammed (s.a.v.)' },
    { text: 'İnsanlara merhamet etmeyene Allah da merhamet etmez.', source: 'Hz. Muhammed (s.a.v.)' },
    { text: 'Hiç bilenlerle bilmeyenler bir olur mu?', source: 'Kur’an-ı Kerim, Zümer 9' },
    { text: 'Kalpler ancak Allah’ı anmakla huzur bulur.', source: 'Kur’an-ı Kerim, Ra’d 28' },
    { text: 'Her zorlukla beraber bir kolaylık vardır.', source: 'Kur’an-ı Kerim, İnşirah 6' },
    { text: 'Allah sabredenlerle beraberdir.', source: 'Kur’an-ı Kerim, Bakara 153' },
    { text: 'Merhamet etmeyene merhamet olunmaz.', source: 'Hz. Muhammed (s.a.v.)' },
    { text: 'Doğru söz yemin istemez.', source: 'Türk Atasözü' },
    { text: 'Güzel ahlak, amellerin en hayırlısındandır.', source: 'İslami öğüt' }
  ],
  dua: [
    { text: 'Rabbim kalbine ferahlık, ömrüne bereket versin.', source: 'Dua' },
    { text: 'Sabreden gönül, sonunda rahmete kavuşur.', source: 'Manevi öğüt' },
    { text: 'Bugünün yorgunluğu, Yaradan’a sığınılınca hafifler.', source: 'Teselli sözü' },
    { text: 'Gönlüne düşen her sıkıntı, dua ile yumuşar.', source: 'Manevi öğüt' },

delete LOCAL_QUOTES.milli;
delete LOCAL_QUOTES.aile;

function setDate() {
  const now = new Date();
  const days   = ['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
  const months = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
  document.getElementById('app-date').textContent =
    `${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()} · ${days[now.getDay()]}`;
}

function applyTheme(cat) {
  document.body.className = cat.theme;
}

function showLoading() {
  document.getElementById('loading').style.display     = 'flex';
  document.getElementById('quote-text').style.display  = 'none';
  document.getElementById('deco-bottom').style.display = 'none';
  document.getElementById('source-area').style.display = 'none';
  document.getElementById('shareBtn').disabled = true;
}

function showQuote(text, source) {
  document.getElementById('loading').style.display     = 'none';
  document.getElementById('quote-text').style.display  = 'block';
  document.getElementById('deco-bottom').style.display = 'block';
  document.getElementById('source-area').style.display = 'block';

  const qt = document.getElementById('quote-text');
  const st = document.getElementById('source-text');
  qt.classList.add('fade-out');
  st.classList.add('fade-out');
  setTimeout(() => {
    qt.textContent = text;
    st.textContent = '— ' + source;
    qt.classList.remove('fade-out');
    st.classList.remove('fade-out');
  }, 300);

  document.getElementById('shareBtn').disabled = false;
}

async function fetchQuote(cat) {
  const res = await fetch('/api/quote', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-3-5-haiku-20241022',
      max_tokens: 300,
      system: 'Sen Türk kültürü ve İslam medeniyetini iyi bilen bir bilgesin. Verilen kategoriye uygun GERÇEK, tarihi olarak doğrulanmış bir söz seç. Cevabını YALNIZCA şu JSON formatında ver, başka hiçbir şey yazma: {"quote": "...söz...", "source": "...kaynak..."}',
      messages: [{ role: 'user', content: `Kategori: ${cat.label}\n${cat.prompt}\nSadece JSON döndür.` }]
    })
  });

  const data = await res.json().catch(() => null);
  if (!res.ok) {
    const apiError = data?.error?.message || data?.error || data?.message || ('API ' + res.status);
    throw new Error(apiError);
  }

  const raw = data.content?.find(b => b.type === 'text')?.text || '';
  if (!raw) throw new Error('API boş cevap verdi');

  const parsed = JSON.parse(raw.replace(/```json|```/g, '').trim());
  if (!parsed?.quote || !parsed?.source) throw new Error('API eksik alan döndürdü');

  return { text: parsed.quote, source: parsed.source };
}

const FALLBACKS = [
  { text: 'Sabır, imanın yarısıdır.', source: 'Hz. Ali (r.a.)' },
  { text: 'İnsanların en hayırlısı, insanlara en fazla faydalı olandır.', source: 'Hz. Muhammed (s.a.v.)' },
  { text: 'Yiğit düştüğü yerden kalkar.', source: 'Türk Atasözü' },
  { text: 'Cennet, annelerin ayakları altındadır.', source: 'Hz. Muhammed (s.a.v.)' },
];

function shouldDisableApi(error) {
  const message = String(error?.message || error || '').toLowerCase();
  return message.includes('credit balance is too low')
    || message.includes('plans & billing')
    || message.includes('purchase credits');
}

function markApiDisabled() {
  apiDisabled = true;
  try {
    sessionStorage.setItem('quote-api-disabled', '1');
    localStorage.setItem('quote-api-disabled', '1');
  } catch {}
}

function saveLocalUsage() {
  try {
    localStorage.setItem('quote-local-used', JSON.stringify(localUsed));
  } catch {}
}

function getLocalQuote(cat, seed) {
  const pool = LOCAL_QUOTES[cat.id] || FALLBACKS;
  if (!pool.length) return FALLBACKS[0];

  if (typeof seed === 'number') {
    return pool[seed % pool.length];
  }

  const used = Array.isArray(localUsed[cat.id]) ? localUsed[cat.id] : [];
  let availableIndexes = pool
    .map((_, index) => index)
    .filter(index => !used.includes(index));

  if (availableIndexes.length === 0) {
    localUsed[cat.id] = [];
    availableIndexes = pool.map((_, index) => index);
  }

  const index = availableIndexes.length > 0
    ? availableIndexes[Math.floor(Math.random() * availableIndexes.length)]
    : Math.floor(Math.random() * pool.length);

  localUsed[cat.id] = [...(localUsed[cat.id] || []), index];
  saveLocalUsage();
  return pool[index];
}

async function resolveQuote(cat, options = {}) {
  const { seed, toastOnLocal = false } = options;

  if (!apiDisabled) {
    try {
      return await fetchQuote(cat);
    } catch (error) {
      console.error('API sozu alinamadi:', error);
      if (shouldDisableApi(error)) {
        markApiDisabled();
        if (toastOnLocal && !apiNoticeShown) {
          showToast('Yapay zeka kredisi bitti · Yerel sözler gösteriliyor');
          apiNoticeShown = true;
        }
      } else if (toastOnLocal) {
        showToast('Servis hatası · Yerel söz gösteriliyor');
      }
    }
  }

  return getLocalQuote(cat, seed);
}

async function loadNewQuote() {
  const unused = CATEGORIES.filter(c => !sessionUsed.includes(c.id));
  const cat = unused.length > 0
    ? unused[Math.floor(Math.random() * unused.length)]
    : CATEGORIES[Math.floor(Math.random() * CATEGORIES.length)];

  sessionUsed.push(cat.id);
  if (sessionUsed.length >= CATEGORIES.length) sessionUsed = [];

  applyTheme(cat);
  showLoading();

  const q = await resolveQuote(cat, { toastOnLocal: true });
  currentQuote = { ...q, cat: cat.label, icon: cat.icon };
  showQuote(q.text, q.source);
}

function getTodayKey() {
  const d = new Date();
  return `q_${d.getFullYear()}_${d.getMonth()}_${d.getDate()}`;
}

async function init() {
  setDate();
  const key = getTodayKey();
  try {
    const cached = JSON.parse(localStorage.getItem(key) || 'null');
    if (cached && cached.text) {
      currentQuote = cached;
      const cat = CATEGORIES.find(c => c.label === cached.cat) || CATEGORIES[0];
      applyTheme(cat);
      showQuote(cached.text, cached.source);
      return;
    }
  } catch {}

  const dayNum = Math.floor(Date.now() / 86400000);
  const cat = CATEGORIES[dayNum % CATEGORIES.length];
  applyTheme(cat);
  showLoading();

  const q = await resolveQuote(cat, { seed: dayNum });
  currentQuote = { ...q, cat: cat.label, icon: cat.icon };
  try { localStorage.setItem(key, JSON.stringify(currentQuote)); } catch {}
  showQuote(q.text, q.source);
}

function drawRoundedRect(ctx, x, y, width, height, radius) {
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.arcTo(x + width, y, x + width, y + height, radius);
  ctx.arcTo(x + width, y + height, x, y + height, radius);
  ctx.arcTo(x, y + height, x, y, radius);
  ctx.arcTo(x, y, x + width, y, radius);
  ctx.closePath();
}

function wrapCanvasText(ctx, text, maxWidth) {
  const words = text.split(/\s+/);
  const lines = [];
  let line = '';

  for (const word of words) {
    const test = line ? `${line} ${word}` : word;
    if (ctx.measureText(test).width <= maxWidth) {
      line = test;
    } else {
      if (line) lines.push(line);
      line = word;
    }
  }

  if (line) lines.push(line);
  return lines;
}

function createShareImageBlob() {
  return new Promise((resolve, reject) => {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    if (!ctx) {
      reject(new Error('Canvas hazirlanamadi'));
      return;
    }

    const styles = getComputedStyle(document.body);
    const palette = {
      bg: styles.getPropertyValue('--bg').trim() || '#110b07',
      card: styles.getPropertyValue('--card-bg').trim() || '#1e1108',
      gold: styles.getPropertyValue('--gold').trim() || '#c9a84c',
      light: styles.getPropertyValue('--gold-light').trim() || '#f0d080',
      text: styles.getPropertyValue('--text').trim() || '#f5ecd7',
      dim: styles.getPropertyValue('--text-dim').trim() || 'rgba(245,236,215,0.55)',
      border: styles.getPropertyValue('--border').trim() || 'rgba(201,168,76,0.25)'
    };

    canvas.width = 1080;
    canvas.height = 1350;

    ctx.fillStyle = palette.bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const glowTop = ctx.createRadialGradient(240, 180, 0, 240, 180, 480);
    glowTop.addColorStop(0, 'rgba(240,208,128,0.16)');
    glowTop.addColorStop(1, 'rgba(240,208,128,0)');
    ctx.fillStyle = glowTop;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const glowBottom = ctx.createRadialGradient(860, 1120, 0, 860, 1120, 520);
    glowBottom.addColorStop(0, 'rgba(201,168,76,0.12)');
    glowBottom.addColorStop(1, 'rgba(201,168,76,0)');
    ctx.fillStyle = glowBottom;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    drawRoundedRect(ctx, 90, 140, 900, 980, 42);
    ctx.fillStyle = palette.card;
    ctx.fill();
    ctx.strokeStyle = palette.border;
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.textAlign = 'center';
    const lineY = 280;
    const lineGradient = ctx.createLinearGradient(340, lineY, 740, lineY);
    lineGradient.addColorStop(0, 'rgba(201,168,76,0)');
    lineGradient.addColorStop(0.5, palette.gold);
    lineGradient.addColorStop(1, 'rgba(201,168,76,0)');
    ctx.strokeStyle = lineGradient;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(360, lineY);
    ctx.lineTo(720, lineY);
    ctx.stroke();

    ctx.fillStyle = palette.text;
    ctx.font = 'italic 58px Playfair Display, serif';
    const quoteLines = wrapCanvasText(ctx, `“${currentQuote.text}”`, 700);
    let y = 410;
    for (const line of quoteLines) {
      ctx.fillText(line, canvas.width / 2, y);
      y += 78;
    }

    ctx.font = '400 32px Crimson Pro, serif';
    ctx.fillStyle = 'rgba(245,236,215,0.72)';
    ctx.fillText(`— ${currentQuote.source}`, canvas.width / 2, Math.min(y + 48, 980));

    canvas.toBlob(blob => {
      if (!blob) {
        reject(new Error('Gorsel olusturulamadi'));
        return;
      }
      resolve(blob);
    }, 'image/png');
  });
}

async function shareWhatsApp() {
  if (!currentQuote) return;

  try {
    showToast('Görsel hazırlanıyor...');
    const blob = await createShareImageBlob();
    const file = typeof File !== 'undefined'
      ? new File([blob], 'gunluk-soz.png', { type: 'image/png' })
      : null;

    if (navigator.share && file && (!navigator.canShare || navigator.canShare({ files: [file] }))) {
      await navigator.share({
        files: [file],
        title: 'Günlük Söz'
      });
      return;
    }

    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = 'gunluk-soz.png';
    link.click();
    setTimeout(() => URL.revokeObjectURL(url), 2000);
    showToast('Görsel indirildi');
  } catch (error) {
    console.error('Paylaşım açılamadı:', error);
    showToast('Paylaşım açılamadı');
  }
}

function getFavs() { try { return JSON.parse(localStorage.getItem('favs') || '[]'); } catch { return []; } }
function saveFavs(f) { try { localStorage.setItem('favs', JSON.stringify(f)); } catch {} }

function saveFavorite() {
  if (!currentQuote) return;
  const favs = getFavs();
  if (favs.some(f => f.text === currentQuote.text)) { showToast('Zaten kaydedilmiş ✓'); return; }
  favs.unshift({ ...currentQuote, saved: new Date().toLocaleDateString('tr-TR') });
  if (favs.length > 50) favs.pop();
  saveFavs(favs);
  showToast('Kaydedildi ♥');
}

function openFavDrawer() {
  const favs = getFavs();
  const list = document.getElementById('fav-list');
  list.innerHTML = favs.length === 0
    ? '<div class="fav-empty">Henüz kayıt yok.<br>♡ butonuna basarak kaydedin.</div>'
    : favs.map(f => `<div class="fav-item"><div class="fav-item-text">"${f.text}"</div><div class="fav-item-src">— ${f.source} · ${f.saved||''}</div></div>`).join('');
  document.getElementById('fav-drawer').classList.add('open');
  document.getElementById('fav-overlay').classList.add('open');
}

function closeFavDrawer() {
  document.getElementById('fav-drawer').classList.remove('open');
  document.getElementById('fav-overlay').classList.remove('open');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}
